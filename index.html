<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Prasekolah - 3D Object</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #dff5d8;
        overflow: hidden;
    }

    #playground {
        width: 100vw;
        height: 100vh;
        position: relative;
        perspective: 1000px; /* Adds depth for 3D rotation */
    }

    .controls {
        position: absolute;
        top: 15%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
    }

    button {
        font-size: 30px;
        padding: 10px 20px;
        margin: 0 10px;
        cursor: pointer;
        background: white;
        border: 2px solid #888;
        border-radius: 10px;
        box-shadow: 0 4px 0 #666;
    }

    button:active {
        transform: translateY(4px);
        box-shadow: none;
    }

    /* --- 3D OBJECT STYLES --- */
    #object-container {
        position: absolute;
        top: 35%;
        left: 50%;
        width: 120px;
        height: 160px;
        transform-style: preserve-3d; /* Crucial for 3D spinning */
        cursor: grab;
    }

    #object-container:active {
        cursor: grabbing;
    }

    /* The main body of the bin */
    .bin-body {
        position: absolute;
        bottom: 0;
        width: 100px;
        height: 120px;
        left: 10px;
        background: linear-gradient(to right, #999 0%, #eee 30%, #ccc 70%, #777 100%);
        border-radius: 10px 10px 20px 20px;
        box-shadow: inset -5px 0 10px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* Vertical ridges on the bin */
    .ridges {
        display: flex;
        gap: 8px;
        opacity: 0.4;
    }
    .ridge {
        width: 6px;
        height: 90%;
        background: #555;
        border-radius: 4px;
        box-shadow: 1px 0 0 rgba(255,255,255,0.5);
    }

    /* The Lid */
    .bin-lid {
        position: absolute;
        top: 25px;
        left: 5px;
        width: 110px;
        height: 25px;
        background: linear-gradient(to bottom, #ddd, #aaa);
        border-radius: 15px;
        box-shadow: 0 5px 5px rgba(0,0,0,0.2);
        z-index: 2;
    }

    /* The Handle */
    .bin-handle {
        position: absolute;
        top: 10px;
        left: 35px;
        width: 50px;
        height: 20px;
        border: 8px solid #bbb;
        border-bottom: none;
        border-radius: 20px 20px 0 0;
        z-index: 1;
    }

    /* --- DESTINATIONS & UI --- */
    .destinations {
        position: absolute;
        bottom: 100px;
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 30px;
    }

    .dropzone {
        width: 150px;
        height: 150px;
        background: white;
        border: 4px dashed #888;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        font-size: 22px;
        transition: transform 0.2s;
    }
    
    .dropzone:hover {
        transform: scale(1.05);
        background: #f0fff0;
    }

    .teacher {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 80px;
    }

    #popup {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.7);
        color: white;
        z-index: 999;
        justify-content: center;
        align-items: center;
        text-align: center;
        flex-direction: column;
    }

    #popup h1 { font-size: 50px; margin-bottom: 10px; }
    #popup p { font-size: 28px; max-width: 700px; padding: 0 20px; }
</style>
</head>
<body>

<div id="playground">

    <div class="controls">
        <button onclick="rotateLeft()">↺ Putar Kiri</button>
        <button onclick="rotateRight()">Putar Kanan ↻</button>
    </div>

    <!-- 3D OBJECT CONTAINER -->
    <div id="object-container" draggable="true">
        <div class="bin-handle"></div>
        <div class="bin-lid"></div>
        <div class="bin-body">
            <div class="ridges">
                <div class="ridge"></div>
                <div class="ridge"></div>
                <div class="ridge"></div>
                <div class="ridge"></div>
                <div class="ridge"></div>
            </div>
        </div>
    </div>

    <div class="destinations">
        <div class="dropzone" data-id="tong">
            <span style="font-size: 40px;">🗑️</span>
            <div>Tong Sampah</div>
        </div>
        <div class="dropzone" data-id="meja">
            <span style="font-size: 40px;">🪑</span>
            <div>Meja</div>
        </div>
        <div class="dropzone" data-id="beg">
            <span style="font-size: 40px;">🎒</span>
            <div>Beg</div>
        </div>
        <div class="dropzone" data-id="mulut">
            <span style="font-size: 40px;">👄</span>
            <div>Mulut</div>
        </div>
    </div>

    <div class="teacher">👩‍🏫</div>

</div>

<div id="popup">
    <h1 id="title"></h1>
    <p id="message"></p>
    <div id="teacherReaction" style="font-size:120px; margin-top: 20px;"></div>
</div>

<!-- Placeholder Audio Files -->
<audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/clown_horn.ogg"></audio>
<audio id="clapSound" src="https://actions.google.com/sounds/v1/crowds/battle_crowd_celebrate_stutter.ogg"></audio>

<script>
// Game Logic
const scenario = {
    correct: "tong",
    message: "Bagus! Sampah perlu dibuang ke dalam tong sampah."
};

let rotation = 0;
const objectContainer = document.getElementById('object-container');

function rotateLeft() {
    rotation -= 45;
    updateRotation();
}

function rotateRight() {
    rotation += 45;
    updateRotation();
}

function updateRotation() {
    // Apply 3D rotation
    objectContainer.style.transform = `translate(-50%, -50%) rotateY(${rotation}deg)`;
}

// Drag and Drop Logic
objectContainer.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text', 'drag');
});

document.querySelectorAll('.dropzone').forEach(zone => {
    zone.addEventListener('dragover', e => {
        e.preventDefault();
    });

    zone.addEventListener('drop', e => {
        e.preventDefault();
        
        if (zone.dataset.id === scenario.correct) {
            // Success
            document.getElementById('popup').style.display = 'flex';
            document.getElementById('title').innerHTML = '🎉 Bagus!';
            document.getElementById('message').innerHTML = scenario.message;
            document.getElementById('teacherReaction').innerHTML = '👏‍🏫👏';
            
            try { document.getElementById('successSound').play(); } catch(e){}
            try { document.getElementById('clapSound').play(); } catch(e){}

            setTimeout(() => {
                alert('Scenario Seterusnya');
                location.reload();
            }, 3000);
        } else {
            // Wrong
            document.getElementById('popup').style.display = 'flex';
            document.getElementById('title').innerHTML = '🙂 Cuba Lagi';
            document.getElementById('message').innerHTML = 'Mari cuba sekali lagi.';
            document.getElementById('teacherReaction').innerHTML = '👩‍🏫';
            
            try { document.getElementById('wrongSound').play(); } catch(e){}

            setTimeout(() => {
                document.getElementById('popup').style.display = 'none';
            }, 2000);
        }
    });
});
</script>

</body>
</html>
