<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Prasekolah</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#dff5d8;overflow:hidden}
#playground{width:100vw;height:100vh;position:relative}
#object{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:100px;cursor:grab;user-select:none}
.controls{position:absolute;top:15%;left:50%;transform:translateX(-50%)}
button{font-size:30px;padding:10px 20px;margin:0 10px}
.destinations{position:absolute;bottom:100px;width:100%;display:flex;justify-content:center;gap:30px}
.dropzone{width:150px;height:150px;background:white;border:4px dashed #888;border-radius:20px;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:22px}
.teacher{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:80px}
#popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);color:white;z-index:999;justify-content:center;align-items:center;text-align:center;flex-direction:column}
#popup h1{font-size:50px}
#popup p{font-size:28px;max-width:700px}
</style>
</head>
<body>
<div id="playground">
    <div class="controls">
        <button onclick="rotateLeft()">↺</button>
        <button onclick="rotateRight()">↻</button>
    </div>
    <div id="object" draggable="true">🗑️</div>
    <div class="destinations">
        <div class="dropzone" data-id="tong">️<div>Tong Sampah</div></div>
        <div class="dropzone" data-id="meja">🪑<div>Meja</div></div>
        <div class="dropzone" data-id="beg">🎒<div>Beg</div></div>
        <div class="dropzone" data-id="mulut"><div>Mulut</div></div>
    </div>
    <div class="teacher">👩‍🏫</div>
</div>
<div id="popup">
    <h1 id="title"></h1>
    <p id="message"></p>
    <div id="teacherReaction" style="font-size:120px;"></div>
</div>
<audio id="successSound" src="success.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>
<audio id="clapSound" src="clap.mp3"></audio>

<script>
const scenario = {
    object:"🗑️", objectName:"Sampah", correct:"tong",
    message:"Bagus! Sampah perlu dibuang ke dalam tong sampah."
};
document.getElementById('object').innerHTML = scenario.object;

let rotation = 0;
function rotateLeft(){rotation-=45;updateRotation()}
function rotateRight(){rotation+=45;updateRotation()}
function updateRotation(){
    document.getElementById('object').style.transform=`translate(-50%,-50%) rotate(${rotation}deg)`;
}

const object=document.getElementById('object');
object.addEventListener('dragstart',e=>{e.dataTransfer.setData('text','drag')});

document.querySelectorAll('.dropzone').forEach(zone=>{
    zone.addEventListener('dragover',e=>{e.preventDefault()});
    zone.addEventListener('drop',e=>{
        e.preventDefault();
        if(zone.dataset.id===scenario.correct){
            document.getElementById('popup').style.display='flex';
            document.getElementById('title').innerHTML='🎉 Bagus!';
            document.getElementById('message').innerHTML=scenario.message;
            document.getElementById('teacherReaction').innerHTML='👏👩‍🏫';
            document.getElementById('successSound').play();
            document.getElementById('clapSound').play();
            setTimeout(()=>{alert('Scenario Seterusnya');location.reload()},3000);
        }else{
            document.getElementById('popup').style.display='flex';
            document.getElementById('title').innerHTML='🙂 Cuba Lagi';
            document.getElementById('message').innerHTML='Mari cuba sekali lagi.';
            document.getElementById('teacherReaction').innerHTML='👩‍';
            document.getElementById('wrongSound').play();
            setTimeout(()=>{document.getElementById('popup').style.display='none'},2000);
        }
    });
});
</script>
</body>
</html>
